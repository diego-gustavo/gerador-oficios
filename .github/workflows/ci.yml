name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm.cmd ci

      - name: Typecheck
        run: npm.cmd run typecheck

      - name: Frontend tests
        run: npm.cmd run test

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
